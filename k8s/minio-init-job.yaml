# k8s/minio-init-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: crypto-analytics
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: alpine:latest
          command: ["sh", "-c", "until nc -z minio 9000; do sleep 2; done"]
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
              mc mb myminio/crypto-lake --ignore-existing
              mc mb myminio/checkpoints --ignore-existing
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
