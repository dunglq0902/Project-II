# k8s/04-spark.yaml
# Spark Master + Worker + Unified Streaming Job
---
# ============================================================
# SPARK MASTER
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: crypto-analytics
spec:
  ports:
    - name: rpc
      port: 7077
    - name: webui
      port: 8080
  selector:
    app: spark-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: crypto-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
        - name: spark-master
          image: crypto-analytics/spark:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "unset SPARK_MASTER_PORT && /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"]
          ports:
            - containerPort: 7077
            - containerPort: 8080
          env:
            - name: SPARK_MASTER_HOST
              value: "0.0.0.0"
            - name: SPARK_MASTER_PORT
              value: "7077"
          resources:
            requests:
              memory: 256Mi
              cpu: "250m"
            limits:
              memory: 512Mi
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
---
# ============================================================
# SPARK WORKER
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: crypto-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: crypto-analytics/spark:latest
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.worker.Worker
            - spark://spark-master:7077
          env:
            - name: SPARK_WORKER_MEMORY
              value: "3g"
            - name: SPARK_WORKER_CORES
              value: "2"
          resources:
            requests:
              memory: 1Gi
              cpu: "500m"
            limits:
              memory: 4Gi
              cpu: "2"
---
# ============================================================
# SPARK UNIFIED STREAMING JOB (Bronze → Silver → Gold → Alerts)
# Chạy dưới dạng Deployment (restart tự động khi fail)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-unified-streaming
  namespace: crypto-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-unified-streaming
  template:
    metadata:
      labels:
        app: spark-unified-streaming
    spec:
      containers:
        - name: spark-unified
          image: crypto-analytics/spark:latest
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-submit
            - --master
            - spark://spark-master:7077
            - --conf
            - "spark.driver.host=$(SPARK_LOCAL_IP)"
            - --conf
            - "spark.driver.memory=1g"
            - --conf
            - "spark.executor.memory=2g"
            - --conf
            - "spark.executor.cores=2"
            - --conf
            - "spark.sql.shuffle.partitions=4"
            - --conf
            - "spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension"
            - --conf
            - "spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog"
            - spark/jobs/unified_streaming.py
          env:
            - name: SPARK_LOCAL_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: AWS_ACCESS_KEY_ID
              value: "admin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "password"
            - name: AWS_REGION
              value: "us-east-1"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: uri
            - name: SPARK_MASTER
              value: "spark://spark-master:7077"
            - name: PYTHONPATH
              value: "/opt/spark/work-dir/spark:/opt/spark/work-dir"
          resources:
            requests:
              memory: 1Gi
              cpu: "500m"
            limits:
              memory: 2Gi
              cpu: "1"
