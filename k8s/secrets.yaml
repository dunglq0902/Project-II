# k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: crypto-analytics
type: Opaque
stringData:
  root-username: root
  root-password: changeme
  uri: mongodb://root:changeme@mongodb:27017
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: crypto-analytics
type: Opaque
stringData:
  root-user: admin
  root-password: password
  access-key: admin
  secret-key: password
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secrets
  namespace: crypto-analytics
type: Opaque
stringData:
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_USER: your_email@gmail.com
  SMTP_PASSWORD: your_app_password_here
  EMAIL_FROM: your_email@gmail.com
---
apiVersion: v1
kind: Secret
metadata:
  name: binance-credentials
  namespace: crypto-analytics
type: Opaque
stringData:
  api-key: your_binance_api_key_here
  api-secret: your_binance_api_secret_here
