# k8s/spark.yaml
# Spark Infrastructure and Unified Job
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: crypto-analytics
spec:
  ports:
    - name: rpc
      port: 7077
    - name: webui
      port: 8080
  selector:
    app: spark-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
        - name: spark-master
          image: crypto-analytics/spark:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "unset SPARK_MASTER_PORT && /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"]
          ports:
            - containerPort: 7077
            - containerPort: 8080
          env:
            - name: SPARK_MASTER_HOST
              value: "0.0.0.0"
            - name: SPARK_MASTER_PORT
              value: "7077"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: crypto-analytics/spark:latest
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.worker.Worker
            - spark://spark-master:7077
          env:
            - name: SPARK_WORKER_MEMORY
              value: "2g"
            - name: SPARK_WORKER_CORES
              value: "2"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-unified-streaming
  namespace: crypto-analytics
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: spark-unified
          image: crypto-analytics/spark:latest
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-submit
            - --master
            - spark://spark-master:7077
            - --conf
            - "spark.driver.memory=512m"
            - --conf
            - "spark.executor.memory=1g"
            - --conf
            - "spark.executor.cores=2"
            - --conf
            - "spark.sql.shuffle.partitions=4"
            - spark/jobs/unified_streaming.py
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: AWS_ACCESS_KEY_ID
              value: "admin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "password"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: uri
