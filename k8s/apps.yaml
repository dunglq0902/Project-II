# k8s/apps.yaml
# Application services
---
apiVersion: v1
kind: Service
metadata:
  name: alert-api
  namespace: crypto-analytics
spec:
  ports:
    - port: 8000
  selector:
    app: alert-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-api
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: alert-api
  template:
    metadata:
      labels:
        app: alert-api
    spec:
      containers:
        - name: alert-api
          image: crypto-analytics/alert-engine:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: uri
            - name: MONGO_DB
              value: "crypto_analytics"
            - name: NOTIFICATION_SVC
              value: "http://notification-service:8001"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: crypto-analytics
spec:
  ports:
    - port: 8001
  selector:
    app: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-svc
          image: crypto-analytics/alert-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "alert_engine.notifier.notification_service:app", "--host", "0.0.0.0", "--port", "8001"]
          envFrom:
            - secretRef:
                name: notification-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-consumer
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: alert-consumer
  template:
    metadata:
      labels:
        app: alert-consumer
    spec:
      containers:
        - name: alert-consumer
          image: crypto-analytics/alert-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "alert_engine.consumer.alert_consumer"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: ALERT_API_URL
              value: "http://alert-api:8000"
            - name: ALERT_TOPIC
              value: "alert-events"
            - name: CONSUMER_GROUP_ID
              value: "alert-consumer-group"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: crypto-analytics
spec:
  type: NodePort
  ports:
    - port: 8501
      nodePort: 30501
  selector:
    app: dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: crypto-analytics/dashboard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: uri
            - name: MONGO_DB
              value: "crypto_analytics"
            - name: ALERT_API_URL
              value: "http://alert-api:8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: crypto-analytics
spec:
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion
          image: crypto-analytics/ingestion:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: BINANCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: binance-credentials
                  key: api-key
            - name: BINANCE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: binance-credentials
                  key: api-secret

